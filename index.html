<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CMD Converter — Windows ↔ Linux</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0c10;
  --surface:#111318;
  --surface2:#181c24;
  --border:#1e2430;
  --border2:#2a3240;
  --accent:#00e5ff;
  --accent2:#7c3aed;
  --green:#00ff88;
  --amber:#ffb800;
  --red:#ff4757;
  --text:#e8edf5;
  --muted:#5a6478;
  --muted2:#3a4155;
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  min-height:100vh;
  overflow-x:hidden;
}

/* grid bg */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem;}

/* header */
header{text-align:center;padding:3rem 0 2.5rem;}
.logo{
  font-family:var(--sans);
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:800;
  letter-spacing:-0.03em;
  line-height:1;
  margin-bottom:0.75rem;
}
.logo span.win{color:var(--accent);}
.logo span.arr{color:var(--muted);margin:0 0.2em;}
.logo span.lin{color:var(--green);}
.tagline{
  font-size:13px;
  color:var(--muted);
  letter-spacing:0.1em;
  text-transform:uppercase;
}

/* mode tabs */
.tabs{
  display:flex;
  gap:6px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:5px;
  margin-bottom:1.5rem;
}
.tab{
  flex:1;
  padding:10px 8px;
  font-family:var(--mono);
  font-size:13px;
  font-weight:500;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:transparent;
  color:var(--muted);
  transition:all 0.2s;
  white-space:nowrap;
}
.tab:hover{color:var(--text);background:var(--surface2);}
.tab.active{
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border2);
}
.tab.active.cmd{color:var(--accent);border-color:rgba(0,229,255,0.3);}
.tab.active.ps{color:#a78bfa;border-color:rgba(124,58,237,0.3);}
.tab.active.rev{color:var(--green);border-color:rgba(0,255,136,0.3);}

/* main card */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  margin-bottom:1rem;
}

/* input area */
.input-area{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);}
.input-row{display:flex;align-items:center;gap:10px;}
.prompt{font-size:18px;font-weight:700;flex-shrink:0;}
.prompt.cmd{color:var(--accent);}
.prompt.ps{color:#a78bfa;}
.prompt.rev{color:var(--green);}
input#cmd{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  font-family:var(--mono);
  font-size:16px;
  color:var(--text);
  caret-color:var(--accent);
}
input#cmd::placeholder{color:var(--muted2);}

/* output area */
.output-area{padding:1.25rem 1.5rem;min-height:64px;position:relative;}
.output-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.output-text{
  font-family:var(--mono);
  font-size:16px;
  color:var(--muted);
  word-break:break-all;
  transition:color 0.2s;
}
.output-text.found{color:var(--green);}
.copy-btn{
  position:absolute;
  top:1.25rem;
  right:1.5rem;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:6px;
  color:var(--muted);
  font-family:var(--mono);
  font-size:11px;
  padding:4px 10px;
  cursor:pointer;
  transition:all 0.15s;
}
.copy-btn:hover{color:var(--text);border-color:var(--border2);}
.copy-btn.copied{color:var(--green);border-color:rgba(0,255,136,0.4);}

/* tip */
.tip-area{
  padding:1rem 1.5rem;
  border-top:1px solid var(--border);
  background:var(--surface2);
  font-size:13px;
  color:var(--muted);
  line-height:1.7;
  min-height:52px;
}
.tip-area code{
  font-family:var(--mono);
  font-size:12px;
  background:rgba(0,229,255,0.08);
  color:var(--accent);
  padding:1px 5px;
  border-radius:4px;
}

/* chips */
.section{margin-bottom:1.5rem;}
.section-title{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:10px;
}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  font-family:var(--mono);
  font-size:12px;
  padding:4px 12px;
  border-radius:20px;
  border:1px solid var(--border2);
  background:var(--surface);
  color:var(--muted);
  cursor:pointer;
  transition:all 0.15s;
}
.chip:hover{color:var(--text);border-color:var(--border);background:var(--surface2);}
.chip.active{color:var(--accent);border-color:rgba(0,229,255,0.4);background:rgba(0,229,255,0.06);}

/* suggestions */
.sugg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.sugg-card{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  font-size:12px;
  font-family:var(--mono);
  color:var(--muted);
  cursor:pointer;
  transition:all 0.15s;
  line-height:1.5;
}
.sugg-card:hover{
  color:var(--text);
  border-color:var(--border2);
  background:var(--surface2);
}

/* badges */
.badges{display:flex;gap:8px;align-items:center;margin-bottom:1.25rem;}
.badge{
  font-size:11px;
  font-weight:500;
  padding:3px 10px;
  border-radius:20px;
  font-family:var(--mono);
}
.badge.win{background:rgba(0,229,255,0.1);color:var(--accent);border:1px solid rgba(0,229,255,0.25);}
.badge.ps-b{background:rgba(124,58,237,0.15);color:#a78bfa;border:1px solid rgba(124,58,237,0.3);}
.badge.lin{background:rgba(0,255,136,0.08);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.badge.arr{background:none;color:var(--muted);border:none;font-size:16px;padding:0;}

/* no-match */
.ask-btn{
  margin-top:10px;
  font-family:var(--mono);
  font-size:13px;
  padding:8px 18px;
  border:1px solid var(--border2);
  border-radius:8px;
  background:transparent;
  color:var(--text);
  cursor:pointer;
  transition:all 0.15s;
}
.ask-btn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}

/* footer */
footer{text-align:center;padding:2rem 0 0;font-size:12px;color:var(--muted2);}

/* scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:600px){
  .tab{font-size:11px;padding:8px 4px;}
  .logo{font-size:2rem;}
  .sugg-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo">
    <span class="win">CMD</span><span class="arr">⇄</span><span class="lin">bash</span>
  </div>
  <p class="tagline">Windows · PowerShell · Linux command converter</p>
</header>

<div class="tabs">
  <button class="tab active cmd" id="tab-cmd" onclick="setMode('cmd')">CMD → Linux</button>
  <button class="tab ps" id="tab-ps" onclick="setMode('ps')">PowerShell → Bash</button>
  <button class="tab rev" id="tab-rev" onclick="setMode('rev')">Linux → Windows</button>
</div>

<div class="badges" id="badges">
  <span class="badge win">Windows CMD</span>
  <span class="badge arr">→</span>
  <span class="badge lin">Linux / Bash</span>
</div>

<div class="card">
  <div class="input-area">
    <div class="input-row">
      <span class="prompt cmd" id="prompt">$</span>
      <input id="cmd" type="text" placeholder="type a command..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="convert(this.value)"/>
    </div>
  </div>
  <div class="output-area">
    <div class="output-label" id="out-label">Linux equivalent</div>
    <div class="output-text" id="output">Start typing above...</div>
    <button class="copy-btn" id="copy-btn" onclick="copyResult()">copy</button>
  </div>
  <div class="tip-area" id="tip">Type any command to see tips and notes.</div>
</div>

<div class="section">
  <div class="section-title">Quick examples</div>
  <div class="chips" id="chips"></div>
</div>

<div class="section" id="sugg-section" style="display:none">
  <div class="section-title">Related suggestions</div>
  <div class="sugg-grid" id="suggestions"></div>
</div>

<footer>
  100+ commands · CMD · PowerShell · Bash · Built with Claude
</footer>

</div>

const exSets={
  cmd:["dir","ipconfig","tasklist","ping","del","shutdown","find","whoami","sc","netstat","taskmgr","sort"],
  ps:["Get-ChildItem","Get-Process","Invoke-WebRequest","Select-String","Get-Service","Sort-Object","Test-Path","Get-Date","Compress-Archive","Get-Help"],
  rev:["ls","grep","ps aux","kill","ssh","curl","diff","chmod","man","cron","sudo","apt"],
};

let mode='cmd';

function getDb(){return mode==='cmd'?cmdDb:mode==='ps'?psDb:revDb;}
function normalize(s){return s.trim().toLowerCase().replace(/\s+/g,' ');}

function findMatch(val){
  if(!val.trim())return null;
  const n=normalize(val);
  const db=getDb();
  const key=mode==='rev'?'lin':'win';
  let m=db.find(e=>normalize(e[key])===n);
  if(m)return m;
  return db.find(e=>n.startsWith(normalize(e[key]))||normalize(e[key]).startsWith(n))||null;
}

function convert(val){
  const out=document.getElementById('output');
  const tip=document.getElementById('tip');
  const sg=document.getElementById('suggestions');
  const ss=document.getElementById('sugg-section');
  if(!val.trim()){
    out.textContent='Start typing above...';
    out.className='output-text';
    tip.innerHTML='Type any command to see tips and notes.';
    ss.style.display='none';
    return;
  }
  const m=findMatch(val);
  const outKey=mode==='rev'?'win':'lin';
  if(m){
    out.textContent=m[outKey];
    out.className='output-text found';
    tip.innerHTML=m.tip;
    sg.innerHTML=m.sugg.map(s=>`<div class="sugg-card" onclick="useChip('${s.replace(/'/g,"\\'").replace(/\\/g,'\\\\')}')">${s}</div>`).join('');
    ss.style.display='block';
  }else{
    out.textContent='No built-in match found';
    out.className='output-text';
    tip.innerHTML=`No mapping for <code>${val}</code>. Try a shorter keyword, or ask Claude via the button below.`;
    sg.innerHTML=`<div style="grid-column:1/-1"><button class="ask-btn" onclick="window.open('https://claude.ai','_blank')">Ask Claude to convert this ↗</button></div>`;
    ss.style.display='block';
  }
}

function useChip(raw){
  const clean=raw.replace(/\s*\(.*?\)/g,'').trim();
  document.getElementById('cmd').value=clean;
  convert(clean);
}

function copyResult(){
  const text=document.getElementById('output').textContent;
  const btn=document.getElementById('copy-btn');
  if(text&&!text.startsWith('Start')&&!text.startsWith('No')){
    navigator.clipboard.writeText(text).catch(()=>{});
    btn.textContent='copied!';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='copy';btn.classList.remove('copied');},1500);
  }
}

function setMode(m){
  mode=m;
  ['cmd','ps','rev'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    el.className='tab '+t+(t===m?' active':'');
  });
  const prompt=document.getElementById('prompt');
  const badges=document.getElementById('badges');
  const outLabel=document.getElementById('out-label');
  const input=document.getElementById('cmd');
  prompt.className='prompt '+m;
  if(m==='cmd'){
    prompt.textContent='C:\\>';
    badges.innerHTML='<span class="badge win">Windows CMD</span><span class="badge arr">→</span><span class="badge lin">Linux / Bash</span>';
    input.placeholder='e.g. dir /s  or  tasklist';
    outLabel.textContent='Linux equivalent';
  }else if(m==='ps'){
    prompt.textContent='PS>';
    badges.innerHTML='<span class="badge ps-b">PowerShell</span><span class="badge arr">→</span><span class="badge lin">Linux / Bash</span>';
    input.placeholder='e.g. Get-ChildItem  or  Invoke-WebRequest';
    outLabel.textContent='Bash equivalent';
  }else{
    prompt.textContent='$';
    badges.innerHTML='<span class="badge lin">Linux / Bash</span><span class="badge arr">→</span><span class="badge win">Windows</span>';
    input.placeholder='e.g. ls -la  or  grep  or  chmod';
    outLabel.textContent='Windows equivalent';
  }
  input.value='';
  document.getElementById('output').textContent='Start typing above...';
  document.getElementById('output').className='output-text';
  document.getElementById('tip').innerHTML='Type any command to see tips and notes.';
  document.getElementById('sugg-section').style.display='none';
  renderChips();
  input.focus();
}

function renderChips(){
  const el=document.getElementById('chips');
  el.innerHTML='';
  exSets[mode].forEach(e=>{
    const c=document.createElement('span');
    c.className='chip';
    c.textContent=e;
    c.onclick=()=>{
      document.getElementById('cmd').value=e;
      convert(e);
      el.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
    };
    el.appendChild(c);
  });
}

renderChips();
document.getElementById('cmd').focus();
